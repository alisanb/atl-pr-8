    <style>
        .success_wrapper {
            width: 480px;
            display: flex;    
            margin: 0 auto;
            flex-direction: column;

            justify-content: center;
            min-height: 100vh;

<style>
        .success_wrapper {
            width: 480px;

            margin: 0 auto;

            align-items: center;
            justify-content: center;

        }
        .icon {

        }
        .main_title {

        }

</head>
<body>
    <div class="main_wrapper">
        <div class="success_wrapper">
            <div class="icon">✓</div>
            <h1 class="main_title" id="success-title">Sifarişiniz üçün təşəkkür edirik!</h1>
            <p class="subtitle" id="success-desc">Müraciətiniz uğurla göndərildi. Yaxın vaxtlarda menecerimiz təfərrüatları dəqiqləşdirmək üçün sizinlə əlaqə saxlayacaqdır.</p>
            <a href="index.html" class="btn_back" id="success-back-btn">Ana səhifəyə qayıt</a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const successTranslations = {
                az: {
                    title: "Sifarişiniz üçün təşəkkür edirik!",
                    desc: "Müraciətiniz uğurla göndərildi. Yaxın vaxtlarda menecerimiz təfərrüatları dəqiqləşdirmək üçün sizinlə əlaqə saxlayacaqdır.",
                    btn: "Ana səhifəyə qayıt",
                    docTitle: "Təşəkkür edirik!"
                },
                ru: {
                    title: "Спасибо за заказ!",
                    desc: "Ваша заявка успешно отправлена. В ближайшее время с вами свяжется наш менеджер для уточнения деталей.",
                    btn: "Вернуться на сайт",
                    docTitle: "Спасибо за заказ!"
                }
            };

            // Get lang parameter from URL query string
            const urlParams = new URLSearchParams(window.location.search);
            const activeLang = urlParams.get('lang') === 'ru' ? 'ru' : 'az';

            // Localize page content
            document.documentElement.lang = activeLang;
            document.title = successTranslations[activeLang].docTitle;
            document.getElementById('success-title').textContent = successTranslations[activeLang].title;
            document.getElementById('success-desc').textContent = successTranslations[activeLang].desc;
            
            const backBtn = document.getElementById('success-back-btn');
            if (backBtn) {
                backBtn.textContent = successTranslations[activeLang].btn;
                backBtn.href = `index.html?lang=${activeLang}`;
            }
        });
    </script>
</body>
